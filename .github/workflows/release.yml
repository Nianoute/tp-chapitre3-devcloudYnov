name: Release - Build & Push (version tag)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notes-app/api/package-lock.json

      - name: Install dependencies
        working-directory: notes-app/api
        run: npm ci

      - name: Run tests
        working-directory: notes-app/api
        run: npm test

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push versioned image
        uses: docker/build-push-action@v5
        with:
          files: notes-app/api/Dockerfile
          context: notes-app/api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notes-app:${{ github.ref_name }}
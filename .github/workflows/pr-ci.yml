name: PR - CI (tests)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notes-app/api/package-lock.json
      
      - name: Install dependencies
        working-directory: notes-app/api
        run: npm ci
      
      - name: Run tests
        working-directory: notes-app/api
        run: npm test